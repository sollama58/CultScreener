<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cultify - CultScreener</title>
  <meta name="description" content="Analyze any Solana token's diamond hands and holder conviction. Paste a CA to get instant holder analytics.">
  <meta name="theme-color" content="#07080a">
  <meta name="color-scheme" content="dark">
  <link rel="icon" href="/thisisfine8bit.jpg" type="image/jpeg">
  <link rel="apple-touch-icon" href="/thisisfine8bit.jpg">
  <link rel="manifest" href="/manifest.json">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="CultScreener">
  <meta property="og:title" content="Cultify - Analyze Any Token">
  <meta property="og:description" content="Analyze any Solana token's diamond hands and holder conviction.">
  <meta property="og:image" content="https://cultscreener.com/CultScreenerBanner.jpg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
  <style>
    .cultify-hero {
      text-align: center;
      padding: 2rem 1rem 1.5rem;
    }
    .cultify-hero h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 0%, var(--fire-primary) 40%, var(--ember) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.4rem;
    }
    .cultify-hero p {
      font-size: 0.85rem;
      color: var(--text-muted);
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.5;
    }

    .cultify-input-section {
      max-width: 560px;
      margin: 0 auto 1.5rem;
      padding: 0 1rem;
    }
    .cultify-input-wrap {
      display: flex;
      gap: 0.5rem;
    }
    .cultify-input {
      flex: 1;
      padding: 0.7rem 1rem;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 0.85rem;
      font-family: var(--font-mono);
      outline: none;
      transition: border-color var(--transition-fast);
    }
    .cultify-input:focus {
      border-color: var(--fire-primary);
    }
    .cultify-input::placeholder {
      color: var(--text-dim);
      font-family: var(--font-sans);
    }
    .cultify-submit {
      padding: 0.7rem 1.25rem;
      background: linear-gradient(135deg, var(--fire-primary), var(--ember));
      color: #fff;
      font-weight: 700;
      font-size: 0.82rem;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      white-space: nowrap;
      transition: opacity var(--transition-fast);
      font-family: var(--font-sans);
      letter-spacing: 0.02em;
    }
    .cultify-submit:hover { opacity: 0.9; }
    .cultify-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Status / gate messages */
    .cultify-status {
      max-width: 560px;
      margin: 0 auto 1.5rem;
      padding: 0 1rem;
      display: none;
    }
    .cultify-status.visible { display: block; }

    .cultify-gate {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      text-align: center;
    }
    .cultify-gate h3 {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    .cultify-gate p {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      line-height: 1.5;
    }
    .cultify-burn-btn {
      padding: 0.65rem 1.5rem;
      background: linear-gradient(135deg, #ff4500, #ff8c00);
      color: #fff;
      font-weight: 700;
      font-size: 0.82rem;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-family: var(--font-sans);
      transition: opacity var(--transition-fast);
    }
    .cultify-burn-btn:hover { opacity: 0.9; }
    .cultify-burn-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .cultify-burn-cost {
      font-family: var(--font-mono);
      color: var(--fire-primary);
      font-weight: 600;
    }
    .cultify-error {
      color: #ef4444;
      font-size: 0.82rem;
      margin-top: 0.75rem;
    }
    .cultify-loading {
      color: var(--text-muted);
      font-size: 0.82rem;
    }

    /* Results section */
    .cultify-results {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1rem;
      display: none;
    }
    .cultify-results.visible { display: block; }

    .cultify-results-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .cultify-token-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .cultify-token-address {
      font-size: 0.72rem;
      font-family: var(--font-mono);
      color: var(--text-dim);
    }
    .cultify-free-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      background: rgba(34, 197, 94, 0.12);
      color: #22c55e;
      border-radius: var(--radius-full);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .cultify-metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .cultify-metric {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 0.85rem;
      text-align: center;
    }
    .cultify-metric-value {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-primary);
      font-family: var(--font-mono);
    }
    .cultify-metric-label {
      font-size: 0.68rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.2rem;
    }

    .cultify-holders-table {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .cultify-holders-table table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    .cultify-holders-table th {
      text-align: left;
      padding: 0.6rem 0.85rem;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border-color);
    }
    .cultify-holders-table td {
      padding: 0.55rem 0.85rem;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
    }
    .cultify-holders-table tr:last-child td { border-bottom: none; }
    .cultify-holders-table .text-right { text-align: right; }
    .cultify-holders-table .mono { font-family: var(--font-mono); }
    .cultify-holders-table .holder-address {
      color: var(--text-secondary);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.78rem;
    }
    .cultify-holders-table .holder-address:hover { color: var(--fire-primary); }

    .concentration-low { color: #22c55e; }
    .concentration-medium { color: var(--ember); }
    .concentration-high { color: #ef4444; }

    /* Token preview card */
    .cultify-preview {
      max-width: 560px;
      margin: 0 auto 1rem;
      padding: 0 1rem;
      display: none;
    }
    .cultify-preview.visible { display: block; }

    .cultify-preview-card {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 0.75rem 1rem;
    }
    .cultify-preview-logo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--bg-tertiary);
      flex-shrink: 0;
    }
    .cultify-preview-info {
      flex: 1;
      min-width: 0;
    }
    .cultify-preview-name {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cultify-preview-ticker {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .cultify-preview-loading {
      font-size: 0.78rem;
      color: var(--text-dim);
      padding: 0.5rem 0;
    }

    @media (max-width: 480px) {
      .cultify-input-wrap { flex-direction: column; }
      .cultify-hero h1 { font-size: 1.25rem; }
      .cultify-metrics { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="/" class="logo">
        <span class="logo-text">CultScreener</span>
      </a>
      <a href="token.html?mint=9zB5wRarXMj86MymwLumSKA1Dx35zPqqKfcZtK1Spump" class="powered-badge"><svg class="flame-icon" width="14" height="14" viewBox="0 0 24 24" fill="url(#flameGrad)"><defs><linearGradient id="flameGrad" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#ff4500"/><stop offset="100%" stop-color="#ff8c00"/></linearGradient></defs><path d="M12 23c-4.97 0-8-3.03-8-7 0-2.22.98-4.12 2.5-5.5C5.5 8 5 5.5 7 3c1 2 3 3.5 5 4 0-2 1-4 3-6 .5 2 1 4 1 6 2-1 3.5-2.5 4-4 0 3-1 5.5-2.5 7.5C19.02 11.88 20 13.78 20 16c0 3.97-3.03 7-8 7z"/></svg>Powered by ASDFASDFA</a>

      <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle navigation" aria-expanded="false">
        <svg class="icon-hamburger" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        <svg class="icon-close" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

      <nav class="nav" id="main-nav">
        <a href="/" class="nav-link">Diamond Hands</a>
        <a href="community.html" class="nav-link">Watchlist</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="cultify.html" class="nav-link active">Cultify</a>
      </nav>

      <div class="header-actions">

      </div>
    </div>
  </header>

  <main class="main">
    <div class="cultify-hero">
      <h1>Cultify</h1>
      <p>Paste any Solana token address to analyze its holders and diamond hands conviction. Curated tokens are free. Others require a 10,000 ASDFASDFA burn.</p>

    <div class="cultify-input-section">
      <div class="cultify-input-wrap">
        <input type="text" id="cultify-mint" class="cultify-input" placeholder="Paste token contract address..." maxlength="44" autocomplete="off" spellcheck="false">

  <script src="js/config.js"></script>

  <script src="js/pwa.js"></script>
</body>
</html>
