<!DOCTYPE html>
<html>
<head><title>Icon Generator - CultScreener</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:2rem">
<h1>CultScreener PWA Icon Generator</h1>
<p>Click "Generate" to create PNG icons from the SVG, then right-click each to save.</p>
<button id="gen" style="padding:12px 24px;font-size:16px;cursor:pointer;background:#ff5722;color:#fff;border:none;border-radius:8px">Generate Icons</button>
<div id="output" style="display:flex;flex-wrap:wrap;gap:2rem;margin-top:2rem"></div>
<script>
document.getElementById('gen').onclick = async () => {
  const sizes = [
    { size: 192, name: 'icon-192.png', src: 'icon.svg' },
    { size: 512, name: 'icon-512.png', src: 'icon.svg' },
    { size: 192, name: 'icon-maskable-192.png', src: 'icon-maskable.svg' },
    { size: 512, name: 'icon-maskable-512.png', src: 'icon-maskable.svg' },
  ];
  const out = document.getElementById('output');
  out.innerHTML = '';
  for (const { size, name, src } of sizes) {
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.src = src;
    await new Promise(r => { img.onload = r; });
    ctx.drawImage(img, 0, 0, size, size);
    const url = canvas.toDataURL('image/png');
    const div = document.createElement('div');
    div.style.textAlign = 'center';
    div.innerHTML = `<p>${name} (${size}x${size})</p><img src="${url}" width="${Math.min(size,256)}" style="border:1px solid #333;border-radius:12px"><br><a href="${url}" download="${name}" style="color:#ff5722">Download</a>`;
    out.appendChild(div);
  }
};
</script>
</body>
</html>
