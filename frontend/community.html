  <main class="main community-page">
    <!-- My Watchlist Section -->
    <section class="community-section terminal-section" id="my-watchlist-section">
      <h2 style="font-size:0.82rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem;">My Watchlist</h2>
      <div id="my-watchlist-connect" style="text-align:center;padding:1.5rem;color:var(--text-muted);font-size:0.88rem;">
        <p>Connect your wallet to see your watchlisted tokens.</p>
        <button class="btn btn-primary btn-sm" style="margin-top:0.75rem;" onclick="if(typeof wallet!=='undefined') wallet.connect();">Connect Wallet</button>
      </div>
      <div id="my-watchlist-content" style="display:none;">
        <table class="terminal-table">
          <thead><tr><th>#</th><th>Token</th><th>Price</th><th>MCap</th><th>Actions</th></tr></thead>
          <tbody id="my-watchlist-body">
            <tr><td colspan="5"><div class="loading-state"><div class="loading-spinner"></div><span>Loading...</span></div></td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- Global Leaderboards -->
    <h2 style="font-size:0.82rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem;">Most Watchlisted</h2>
