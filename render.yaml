# Render Blueprint - CultScreener
# Deploy with: render blueprint apply
# Documentation: https://render.com/docs/blueprint-spec
#
# NOTE: Static sites cannot be created via blueprint.
# After deploying this blueprint, manually create the frontend static site.

services:
  # =====================================================
  # Backend API Service
  # =====================================================
  - type: web
    name: cultscreener-api
    runtime: node
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      # Database connection (auto-populated from Render PostgreSQL)
      - key: DATABASE_URL
        fromDatabase:
          name: cultscreener-db
          property: connectionString

      # Redis connection (auto-populated from Render Redis)
      - key: REDIS_URL
        fromService:
          type: redis
          name: cultscreener-redis
          property: connectionString

      # API Keys (set these manually in Render dashboard)
      - key: HELIUS_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: SOLSCAN_API_KEY
        sync: false

      # Admin password (required for curated token management)
      - key: ADMIN_PASSWORD
        sync: false

      # Cookie signing secret (required — sessions invalidated on restart without this)
      - key: COOKIE_SECRET
        sync: false

      # SSL certificate verification for PostgreSQL (set to 'false' for Render's self-signed certs)
      - key: DB_SSL_REJECT_UNAUTHORIZED
        value: "false"

      # Application settings
      - key: NODE_ENV
        value: production

      # CORS - Update this to your actual frontend URL after creating the static site
      - key: CORS_ORIGIN
        value: https://cultscreener-frontend.onrender.com,https://cultscreener.com,https://www.cultscreener.com

      # Rate limiting configuration
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"

      # Cache settings (seconds)
      - key: CACHE_TOKEN_TTL
        value: "300"
      - key: CACHE_PRICE_TTL
        value: "60"

  # =====================================================
  # Background Worker (BullMQ job processor)
  # =====================================================
  - type: worker
    name: cultscreener-worker
    runtime: node
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run worker
    envVars:
      # Database connection (auto-populated from Render PostgreSQL)
      - key: DATABASE_URL
        fromDatabase:
          name: cultscreener-db
          property: connectionString

      # Redis connection (auto-populated from Render Redis)
      - key: REDIS_URL
        fromService:
          type: redis
          name: cultscreener-redis
          property: connectionString

      # API Keys — worker needs these for background jobs
      - key: HELIUS_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false

      # SSL certificate verification for PostgreSQL (set to 'false' for Render's self-signed certs)
      - key: DB_SSL_REJECT_UNAUTHORIZED
        value: "false"

      # Application settings
      - key: NODE_ENV
        value: production

      # Worker performance tuning (starter plan has limited CPU — keep concurrency modest)
      - key: WORKER_CONCURRENCY
        value: "10"
      - key: WORKER_LIMITER_MAX
        value: "10"

  # =====================================================
  # Redis (BullMQ job queue)
  # =====================================================
  - type: redis
    name: cultscreener-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: [] # Allow only internal Render services

# =====================================================
# PostgreSQL Database
# =====================================================
databases:
  - name: cultscreener-db
    plan: basic-256mb
    region: oregon
    databaseName: cultscreener
    user: cultscreener_user

# =====================================================
# MANUAL STEPS REQUIRED AFTER BLUEPRINT DEPLOYMENT:
#
# 1. Set API keys in Render Dashboard (Environment tab):
#    - HELIUS_API_KEY (required for holder analysis)
#    - ADMIN_PASSWORD (required for curated token management)
#    - COOKIE_SECRET (required for session persistence)
#    - COINGECKO_API_KEY (optional — higher rate limits)
#
# 2. Create the frontend Static Site manually:
#    a. Go to Render Dashboard > New > Static Site
#    b. Connect your GitHub repository
#    c. Configure:
#       - Name: cultscreener-frontend
#       - Root Directory: frontend
#       - Build Command: (leave blank)
#       - Publish Directory: .
#    d. Add rewrite rules in Settings > Redirects/Rewrites:
#       - Source: /token/*    -> Destination: /token.html (Rewrite)
#       - Source: /community  -> Destination: /community.html (Rewrite)
#       - Source: /about      -> Destination: /about.html (Rewrite)
#
# 3. Update CORS_ORIGIN on cultscreener-api:
#    After creating the static site, copy its URL and update
#    the CORS_ORIGIN env var on the API service to match.
#    If using a custom domain, add both:
#      https://cultscreener-frontend.onrender.com,https://yourdomain.com
# =====================================================
